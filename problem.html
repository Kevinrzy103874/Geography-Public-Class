<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Arla金牌推荐官 · 极速闯关 | 欧洲西部地理挑战</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fff5e6 0%, #fae6cf 100%);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 30px 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 直播间头部 */
        .live-header {
            background: linear-gradient(135deg, #1b4d2e 0%, #2a6e3f 100%);
            border-radius: 60px;
            padding: 18px 32px;
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            color: #fff8e7;
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
            border: 1px solid #ffd966;
        }
        .live-header h1 {
            font-size: 1.6rem;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .score-badge {
            background: #ffd966cc;
            backdrop-filter: blur(4px);
            padding: 6px 24px;
            border-radius: 40px;
            font-weight: 700;
            color: #2c5a2a;
        }
        .live-badge {
            background: #ff6b6b;
            color: white;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.7rem;
            margin-left: 12px;
        }

        /* 左右栏布局 */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
        }
        /* 左侧：选项区 */
        .left-options {
            flex: 1.4;
            min-width: 300px;
            background: white;
            border-radius: 48px;
            padding: 28px 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.08);
            border: 1px solid #f0dcb8;
        }
        /* 右侧：解析 + 进度条 + 下一题 */
        .right-analysis {
            flex: 1;
            min-width: 280px;
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 28px 28px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.08);
            border: 1px solid #ffdca8;
            display: flex;
            flex-direction: column;
            gap: 24px;
            height: fit-content;
            position: sticky;
            top: 24px;
        }

        /* 左侧题号与选项样式 */
        .question-meta {
            font-size: 1rem;
            color: #b8832f;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
            border-left: 4px solid #e6b85e;
            padding-left: 16px;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 12px 0 8px;
        }
        .opt-btn {
            background: #fef7e8;
            border: 2px solid #e6cf9e;
            border-radius: 60px;
            padding: 14px 24px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
            color: #4a3520;
        }
        .opt-btn:hover:not(.disabled-opt) {
            background: #f3e5c9;
            transform: translateX(5px);
            border-color: #d4a34e;
        }
        .opt-prefix {
            background: #e6cf9e;
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 40px;
            font-weight: 800;
            color: #3d2a1a;
        }
        .opt-btn.correct-highlight {
            background: #8bc34a;
            border-color: #4c6e2c;
            color: white;
        }
        .opt-btn.correct-highlight .opt-prefix {
            background: #fef7e8;
            color: #2c5a2a;
        }
        .opt-btn.wrong-highlight {
            background: #f0a3a3;
            border-color: #c95a4a;
            text-decoration: line-through;
            color: #5e2e2e;
        }
        .disabled-opt {
            pointer-events: none;
            opacity: 0.8;
        }

        /* 右侧样式 */
        .analysis-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 700;
            border-left: 5px solid #e6b85e;
            padding-left: 16px;
            color: #3b2a1a;
        }
        .analysis-card {
            background: #fefaf0;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #f0dcb8;
            min-height: 280px;
        }
        .analysis-content {
            line-height: 1.55;
            color: #4a3a28;
            font-size: 0.95rem;
        }
        .progress-section {
            margin-top: 8px;
            padding-top: 8px;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            font-weight: 600;
            color: #7a623a;
            margin-bottom: 8px;
        }
        .progress-bar-bg {
            background: #e6dcc8;
            border-radius: 30px;
            height: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8bc34a, #d4a34e);
            border-radius: 30px;
            transition: width 0.35s ease;
        }
        .next-btn {
            background: #d4a34e;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }
        .next-btn:hover:not(:disabled) {
            background: #b8832f;
            transform: scale(0.98);
        }
        .next-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        footer {
            text-align: center;
            margin-top: 32px;
            font-size: 0.7rem;
            color: #b8a07a;
        }
        @media (max-width: 850px) {
            .dashboard { flex-direction: column; }
            .right-analysis { position: static; }
        }
        .result-badge {
            display: inline-block;
            margin-bottom: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 直播间头部 -->
    <div class="live-header">
        <h1>
            <i class="fas fa-crown"></i> Arla金牌推荐官直播间
            <i class="fas fa-cow"></i>
            <span class="live-badge"><i class="fas fa-circle" style="font-size: 0.6rem;"></i> LIVE</span>
        </h1>
        <div class="score-badge"><i class="fas fa-star"></i> 带货积分: <span id="scoreValue">0</span> / <span id="totalQSpan">0</span></div>
    </div>

    <div class="dashboard">
        <!-- 左侧：纯选项区（无题面，只有选项按钮） -->
        <div class="left-options">
            <div class="question-meta" id="questionNumber">第 1 / 4 题</div>
            <div class="options-grid" id="optionsContainer"></div>
            <!-- 左侧底部加一点装饰 -->
            <div style="margin-top: 24px; font-size:0.7rem; text-align:center; color:#cbb88a;">
                <i class="fas fa-map-pin"></i> 点击选项，右侧解锁Arla金牌解析
            </div>
        </div>

        <!-- 右侧：解析栏 + 进度条 + 下一题 -->
        <div class="right-analysis">
            <div class="analysis-header">
                <i class="fas fa-scroll"></i> Arla金牌解析
            </div>
            <div class="analysis-card" id="analysisCard">
                <div class="analysis-content" id="analysisText">
                    ✨ 点击左侧选项，解锁带货秘籍 ✨
                </div>
            </div>

            <div class="progress-section">
                <div class="progress-info">
                    <span><i class="fas fa-chart-simple"></i> 通关进度</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <button class="next-btn" id="nextBtn">
                <i class="fas fa-arrow-right"></i> 下一题
            </button>
        </div>
    </div>
    <footer>
        <i class="fas fa-crown"></i> Arla® 源自北欧 · 自然奶香 · 金牌推荐官挑战
    </footer>
</div>

<script>
    // ============================================================
    // 题目数据（纯选项+答案+主题解析，无题面文字）
    // 共4道题: 中欧班列2题 + 乳畜业2题，解析融合 Arla 带货风格
    // ============================================================
    const QUESTIONS = [
        {   // 第1题：中欧班列优势
            options: ["A．①②③", "B．③④⑤", "C．①②⑤", "D．①③④"],
            answer: "C",
            explanation: "✅ 中欧班列受自然环境的影响小，正点准时，运价适中，①②⑤正确；灵活性较差，速度比空运慢，③④错误。<br>🎯 <strong>Arla带货知识点</strong>：正因中欧班列高效稳定，Arla奶酪才能从欧洲牧场快速直达中国，新鲜品质有保障！"
        },
        {   // 第2题：欧洲返回物品
            options: ["A．泰国香米", "B．韩国泡菜", "C．巴西咖啡", "D．德国奶酪"],
            answer: "D",
            explanation: "✅ 欧洲西部乳畜业发达，德国奶酪是欧洲代表性产品，泰国、韩国、巴西不在欧洲。<br>🧀 <strong>Arla带货知识点</strong>：Arla作为欧洲乳业巨头，奶酪、黄油正是中欧班列的“常客”，满载北欧奶香驶向中国。"
        },
        {   // 第3题：温带海洋性气候最适合乳畜业（用简洁选项）
            options: ["A．①（寒带）", "B．②（大西洋沿岸）", "C．③（内陆）", "D．④（地中海沿岸）"],
            answer: "B",
            explanation: "✅ ②地位于大西洋沿岸，属于温带海洋性气候，多阴雨天气，为牧草提供优质生长环境，最适宜乳畜业。<br>🌿 <strong>Arla带货知识点</strong>：Arla黄金奶源带正位于大西洋沿岸的北欧，全年温和湿润，牧草天然多汁，牛奶格外香浓！"
        },
        {   // 第4题：社会经济条件（多选形式转单选组合）
            options: ["A．①②③", "B．①③④", "C．②③④", "D．①②④"],
            answer: "C",
            explanation: "✅ 气候温和湿润属于自然条件，题目问社会经济条件，因此②鲜奶冷藏技术高、③居民饮食习惯、④奶制品加工技术先进正确。<br>🏭 <strong>Arla带货知识点</strong>：Arla拥有世界领先的冷链技术+百年加工工艺，加上欧洲人酷爱乳制品，共同造就金牌品质！"
        }
    ];

    // 全局变量
    let currentIndex = 0;          // 当前第几题 (0-3)
    const totalQuestions = QUESTIONS.length;
    let userAnswers = new Array(totalQuestions).fill(null);
    let questionStatus = new Array(totalQuestions).fill(false);
    let score = 0;

    // DOM 元素
    const scoreSpan = document.getElementById('scoreValue');
    const totalQSpan = document.getElementById('totalQSpan');
    const progressFill = document.getElementById('progressFill');
    const progressPercentSpan = document.getElementById('progressPercent');
    const questionNumberDiv = document.getElementById('questionNumber');
    const optionsContainer = document.getElementById('optionsContainer');
    const analysisTextDiv = document.getElementById('analysisText');
    const nextBtn = document.getElementById('nextBtn');

    // 更新积分和进度条
    function updateScoreAndProgress() {
        scoreSpan.innerText = `${score}/${totalQuestions}`;
        const percent = totalQuestions > 0 ? Math.round((score / totalQuestions) * 100) : 0;
        progressFill.style.width = `${percent}%`;
        progressPercentSpan.innerText = `${percent}%`;
    }

    // 高亮选中的选项（正确绿色/错误红色，并标记正确答案边框）
    function highlightSelectedOption(selectedLetter, correctLetter) {
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(btn => {
            const val = btn.getAttribute('data-opt-value');
            if (val === selectedLetter) {
                if (val === correctLetter) {
                    btn.classList.add('correct-highlight');
                } else {
                    btn.classList.add('wrong-highlight');
                }
            }
            if (val === correctLetter && val !== selectedLetter) {
                btn.style.border = "2px solid #8bc34a";
                btn.style.backgroundColor = "#eef5e0";
            }
        });
    }

    // 禁用/启用选项
    function disableOptions(disabled) {
        const btns = document.querySelectorAll('.opt-btn');
        btns.forEach(btn => {
            if (disabled) {
                btn.classList.add('disabled-opt');
            } else {
                btn.classList.remove('disabled-opt');
            }
        });
    }

    // 根据当前题目和用户答案，更新右侧解析区（Arla风格）
    function updateAnalysisForCurrent() {
        if (currentIndex >= totalQuestions) return;
        const q = QUESTIONS[currentIndex];
        const answered = questionStatus[currentIndex];
        if (!answered) {
            analysisTextDiv.innerHTML = '✨ 点击左侧选项，解锁带货秘籍 ✨<br><span style="font-size:0.85rem;">Arla推荐官，选对即得分～</span>';
            return;
        }
        const selectedLetter = userAnswers[currentIndex];
        const isCorrect = (selectedLetter === q.answer);
        // 获取正确选项的完整文本
        let correctOptionText = "";
        const optMap = { A:0, B:1, C:2, D:3 };
        const correctIdx = optMap[q.answer];
        if (q.options[correctIdx]) correctOptionText = q.options[correctIdx];
        let selectedText = "";
        const selectedIdx = optMap[selectedLetter];
        if (q.options[selectedIdx]) selectedText = q.options[selectedIdx];

        const resultIcon = isCorrect ? 'fa-check-circle' : 'fa-times-circle';
        const resultColor = isCorrect ? '#6b8c3e' : '#c95a4a';
        const resultText = isCorrect ? '✓ 推荐官回答正确' : '✗ 推荐官再学学';

        const analysisHtml = `
            <div style="margin-bottom: 12px;">
                <div class="result-badge" style="color:${resultColor};">
                    <i class="fas ${resultIcon}" style="margin-right: 8px;"></i> ${resultText}
                </div>
                <div style="background: #f0e8d8; border-radius: 20px; padding: 12px; margin: 10px 0;">
                    <i class="fas fa-trophy"></i> <strong>正确答案：${q.answer}. ${correctOptionText}</strong>
                </div>
            </div>
            <div style="border-top: 1px dashed #e6cf9e; padding-top: 12px;">
                <i class="fas fa-brain"></i> <strong>📖 Arla地理小课堂</strong><br>
                <div style="margin-top: 8px; line-height: 1.5;">${q.explanation}</div>
            </div>
            <div style="background: #fff7e8; border-radius: 20px; padding: 12px; margin-top: 12px; border-left: 4px solid #d4a34e;">
                <i class="fas fa-graduation-cap"></i> <strong>你的选择</strong>：${selectedLetter}. ${selectedText}<br>
                <i class="fas fa-glass-cheers"></i> ${isCorrect ? "太棒了！你离金牌推荐官更近一步！" : "再巩固一下：欧洲西部=温和湿润+平原+乳畜业，Arla奶源就来自这样的黄金地带。"}
            </div>
        `;
        analysisTextDiv.innerHTML = analysisHtml;
    }

    // 渲染当前题目（只渲染选项按钮，无题干）
    function renderCurrentQuestion() {
        if (currentIndex >= totalQuestions) {
            // 通关界面
            optionsContainer.innerHTML = '';
            analysisTextDiv.innerHTML = '🎉 恭喜你成为Arla金牌推荐官！ 🎉<br>你对欧洲西部牛奶地理密码了如指掌，带货满分！';
            nextBtn.disabled = true;
            nextBtn.style.opacity = '0.5';
            questionNumberDiv.innerText = '通关完成';
            return;
        }

        const q = QUESTIONS[currentIndex];
        questionNumberDiv.innerText = `第 ${currentIndex+1} / ${totalQuestions} 题`;

        // 生成选项按钮
        let optionsHtml = '';
        const optionLetters = ['A', 'B', 'C', 'D'];
        q.options.forEach((optText, idx) => {
            const letter = optionLetters[idx];
            optionsHtml += `
                <div class="opt-btn" data-opt-value="${letter}" data-opt-letter="${letter}">
                    <span class="opt-prefix">${letter}</span>
                    <span>${optText}</span>
                </div>
            `;
        });
        optionsContainer.innerHTML = optionsHtml;

        // 如果本题已经作答过，则恢复高亮样式并禁用选项
        if (questionStatus[currentIndex]) {
            const selectedVal = userAnswers[currentIndex];
            disableOptions(true);
            highlightSelectedOption(selectedVal, q.answer);
            updateAnalysisForCurrent();
        } else {
            disableOptions(false);
            // 绑定点击事件
            const optDivs = document.querySelectorAll('.opt-btn');
            optDivs.forEach(btn => {
                btn.classList.remove('correct-highlight', 'wrong-highlight');
                btn.addEventListener('click', (e) => {
                    if (questionStatus[currentIndex]) return;
                    const selectedLetter = btn.getAttribute('data-opt-value');
                    const isCorrect = (selectedLetter === q.answer);
                    // 记录答案
                    userAnswers[currentIndex] = selectedLetter;
                    questionStatus[currentIndex] = true;
                    if (isCorrect) {
                        score++;
                        updateScoreAndProgress();
                    }
                    // 高亮
                    highlightSelectedOption(selectedLetter, q.answer);
                    disableOptions(true);
                    // 刷新右侧解析
                    updateAnalysisForCurrent();
                });
            });
        }
        // 确保解析内容匹配（未作答时显示提示）
        if (!questionStatus[currentIndex]) {
            analysisTextDiv.innerHTML = '✨ 点击左侧选项，解锁带货秘籍 ✨<br><span style="font-size:0.85rem;">Arla推荐官，选对即得分～</span>';
        } else {
            updateAnalysisForCurrent();
        }
    }

    // 下一题逻辑
    function goToNext() {
        if (currentIndex >= totalQuestions) return;
        // 未作答不能跳转
        if (!questionStatus[currentIndex]) {
            analysisTextDiv.innerHTML = '⚠️ 请先完成当前题目再继续！<br>选择选项后，Arla金牌解析会自动出现。';
            return;
        }
        if (currentIndex + 1 < totalQuestions) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            // 已经是最后一题且已答，显示通关界面
            currentIndex = totalQuestions; // 标记完成
            renderCurrentQuestion(); // 展示通关祝贺
            analysisTextDiv.innerHTML = '<i class="fas fa-crown"></i> 🎉 闯关完成！你已是Arla金牌推荐官，快去带货吧～ 🎉';
            nextBtn.disabled = true;
            nextBtn.style.opacity = '0.5';
        }
        updateScoreAndProgress();
    }

    // 初始化总题数、积分
    function init() {
        totalQSpan.innerText = totalQuestions;
        updateScoreAndProgress();
        renderCurrentQuestion();
        nextBtn.addEventListener('click', goToNext);
    }

    init();
</script>
</body>
</html>
